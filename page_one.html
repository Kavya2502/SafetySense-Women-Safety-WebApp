<!DOCTYPE html>
<html>
<head>
  <title>SafetySense - Navigation</title>
  <link rel="stylesheet" type="text/css" href="style.css" title="style">

  <style>
  #menubar {
    width: 100% !important;
    height: 70px;
    margin: 0;
    padding: 0;
  }

  ul#menu {
    transform: none !important;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 0;
    padding: 0;
  }

  #right-panel {
    font-family: 'Roboto', sans-serif;
    float: right;
    width: 20%;
    height: calc(100vh - 70px);
    background: #ffffff;
    color: #000000;
    padding: 20px;
    box-sizing: border-box;
    overflow-y: auto;
  }

  html,
  body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  #map {
    width: 80%;
    height: calc(100vh - 70px);
    float: left;
  }

  #output {
    font-size: 13px;
    color: #000000;
    line-height: 1.6;
  }

  #right-panel strong {
    display: block;
    font-size: 20px;
    margin-bottom: 15px;
    color: #6d28d9;
  }
</style>
</head>

<body>
  <div id="menubar">
    <ul id="menu">
      <li><a href="index.html">Welcome Page</a></li>
      <li class="selected"><a href="page_one.html">Navigation</a></li>
      <li><a href="page_two.html">Safe Zone</a></li>
      <li><a href="page_three.html">Guardians</a></li>
      <li><a href="page_four.html">Safety Alarm</a></li>
    </ul>
  </div>

  <div id="right-panel">
    <strong>Route Results</strong>
    <div id="output"></div>
  </div>

  <div id="map"></div>

  <script>
    function initMap() {
      var bounds = new google.maps.LatLngBounds();
      var markersArray = [];

      var origin = { lat: 12.9197, lng: 77.6836 };
      var destination = { lat: 12.9288891, lng: 77.6284521 };

      var map = new google.maps.Map(document.getElementById("map"), {
        center: origin,
        zoom: 12
      });

      var geocoder = new google.maps.Geocoder();
      var service = new google.maps.DistanceMatrixService();

      service.getDistanceMatrix(
        {
          origins: [origin],
          destinations: [destination],
          travelMode: "DRIVING",
          unitSystem: google.maps.UnitSystem.METRIC,
          avoidHighways: false,
          avoidTolls: false
        },
        function(response, status) {
          if (status !== "OK") {
            alert("Error was: " + status);
          } else {
            var originList = response.originAddresses;
            var destinationList = response.destinationAddresses;
            var outputDiv = document.getElementById("output");
            outputDiv.innerHTML = "";
            deleteMarkers(markersArray);

            var showGeocodedAddressOnMap = function(asDestination) {
              return function(results, status) {
                if (status === "OK") {
                  map.fitBounds(bounds.extend(results[0].geometry.location));
                  markersArray.push(
                    new google.maps.Marker({
                      map: map,
                      position: results[0].geometry.location
                    })
                  );
                } else {
                  alert("Geocode was not successful due to: " + status);
                }
              };
            };

            for (var i = 0; i < originList.length; i++) {
              var results = response.rows[i].elements;

              geocoder.geocode(
                { address: originList[i] },
                showGeocodedAddressOnMap(false)
              );

              for (var j = 0; j < results.length; j++) {
                geocoder.geocode(
                  { address: destinationList[j] },
                  showGeocodedAddressOnMap(true)
                );

                outputDiv.innerHTML +=
                  originList[i] +
                  " to " +
                  destinationList[j] +
                  ": " +
                  results[j].distance.text +
                  " in " +
                  results[j].duration.text +
                  "<br>";
              }
            }
          }
        }
      );
    }

    function deleteMarkers(markersArray) {
      for (var i = 0; i < markersArray.length; i++) {
        markersArray[i].setMap(null);
      }
      markersArray = [];
    }
  </script>

  <!-- For local testing, replace YOUR_GOOGLE_MAPS_API_KEY with your actual key -->
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap"></script>
</body>
</html>
